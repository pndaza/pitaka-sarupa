name: pitaka_sarupa
description: A new Flutter project.
publish_to: 'none' 
version: 1.0.1+2

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  substring_highlight: ^1.0.33
  super_sliver_list: ^0.4.1
  flex_color_scheme: ^8.4.0
  material_segmented_control: ^5.0.1
  favorite_button: ^0.0.4
  like_button: ^2.1.0
  flutter_slidable: ^4.0.3
  community_material_icon: ^5.9.55
  flutter_widget_from_html_core: ^0.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0

icons_launcher:
  image_path: "assets/icons/pitaka_sarupa.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
    macos:
      enable: true
    windows:
      enable: true
    linux:
      enable: true

flutter:  
  uses-material-design: true

  assets:
    - assets/database/pitaka_sarupa.db
    - assets/info.html

  fonts:
    - family: Pyidaungsu
      fonts:
        - asset: assets/fonts/Pyidaungsu-Regular.ttf
        - asset: assets/fonts/Pyidaungsu-Bold.ttf